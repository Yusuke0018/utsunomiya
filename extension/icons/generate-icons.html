<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Right-click each canvas and "Save Image As" to create the icon PNGs.</p>
<div>
  <h3>icon16.png</h3>
  <canvas id="c16" width="16" height="16"></canvas>
</div>
<div>
  <h3>icon48.png</h3>
  <canvas id="c48" width="48" height="48"></canvas>
</div>
<div>
  <h3>icon128.png</h3>
  <canvas id="c128" width="128" height="128"></canvas>
</div>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background circle
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#1e40af');
  grad.addColorStop(1, '#3b82f6');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(s/2, s/2, s/2, 0, Math.PI * 2);
  ctx.fill();

  // Clipboard icon (simplified)
  ctx.fillStyle = '#ffffff';
  const pad = s * 0.22;
  const w = s - pad * 2;
  const h = s - pad * 1.6;
  const r = s * 0.06;

  // Board body
  roundRect(ctx, pad, pad + s*0.08, w, h, r);
  ctx.fill();

  // Clip top
  ctx.fillStyle = grad;
  const clipW = w * 0.4;
  const clipH = s * 0.12;
  roundRect(ctx, s/2 - clipW/2, pad, clipW, clipH, r);
  ctx.fill();

  // Lines
  ctx.fillStyle = '#93c5fd';
  const lineY = pad + s*0.28;
  const lineH = s * 0.06;
  const lineGap = s * 0.12;
  for (let i = 0; i < 3; i++) {
    const lw = i === 2 ? w * 0.5 : w * 0.65;
    roundRect(ctx, pad + s*0.08, lineY + i * lineGap, lw, lineH, lineH/2);
    ctx.fill();
  }

  // Checkmark
  ctx.strokeStyle = '#059669';
  ctx.lineWidth = s * 0.06;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const cx = s * 0.68, cy = s * 0.62;
  ctx.beginPath();
  ctx.moveTo(cx - s*0.08, cy);
  ctx.lineTo(cx - s*0.02, cy + s*0.06);
  ctx.lineTo(cx + s*0.1, cy - s*0.06);
  ctx.stroke();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

drawIcon(document.getElementById('c16'));
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c128'));
</script>
</body>
</html>
